<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Left strand (S-curve) -->
  <path d="M10 5 C10 10, 22 12, 22 16 C22 20, 10 22, 10 27"
        fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Right strand (mirrored S-curve) -->
  <path d="M22 5 C22 10, 10 12, 10 16 C10 20, 22 22, 22 27"
        fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Cross-rungs at top, middle, bottom -->
  <line x1="10" y1="5"  x2="22" y2="5"  stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="10" y1="16" x2="22" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="10" y1="27" x2="22" y2="27" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
</svg>
